<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>She is Chosen</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🦋 She is Chosen</h1>

<p class="verse">
Proverbs 31:25 — She is clothed in strength and dignity
</p>

</header>


<nav>

<a href="#verse">Verse</a>
<a href="#bible">Bible</a>
<a href="#devotionals">Devotionals</a>
<a href="#music">Worship</a>
<a href="#discussion">Discussion</a>
<a href="#prayer">Prayer</a>
<a href="#tips">Tips</a>
<a href="#saved">Saved</a>

</nav>



<section id="login" class="card">

<h2>Choose Username</h2>

<input id="usernameInput" placeholder="username">

<button onclick="saveUsername()">Enter</button>

</section>



<section id="verse" class="card">

<h2>Verse of the Day</h2>

<p id="dailyVerse"></p>

<button onclick="saveVerse()">Save Verse</button>

</section>



<section id="bible" class="card">

<h2>Search the Bible</h2>

<input id="searchInput" placeholder="John 3:16">

<button onclick="searchBible()">Search</button>

<p id="bibleResult"></p>

</section>



<section id="devotionals" class="card">

<h2>Devotionals</h2>

<textarea id="devotionalText"></textarea>

<button onclick="postDevotional()">Post</button>

<div id="devotionalList"></div>

</section>



<section id="music" class="card">

<h2>Worship Music</h2>

<input id="musicLink" placeholder="YouTube link">

<button onclick="addMusic()">Add</button>

<div id="musicList"></div>

</section>



<section id="discussion" class="card">

<h2>Discussion Thread</h2>

<textarea id="discussionText"></textarea>

<button onclick="postDiscussion()">Post</button>

<div id="discussionList"></div>

</section>



<section id="prayer" class="card">

<h2>Prayer & Praise</h2>

<textarea id="prayerText"></textarea>

<button onclick="postPrayer()">Share</button>

<div id="prayerList"></div>

</section>



<section id="tips" class="card">

<h2>Study Tips From Others</h2>

<textarea id="tipText"></textarea>

<button onclick="postTip()">Share Tip</button>

<div id="tipsList"></div>

</section>



<section id="saved" class="card">

<h2>Saved Verses</h2>

<div id="savedVerses"></div>

</section>


<script src="app.js"></script>

</body>
</html>
