<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>She is Chosen</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<header>
<h1>She is Chosen</h1>
<p class="keyverse">"She is clothed with strength and dignity." – Proverbs 31:25</p>
</header>

<nav>
<button onclick="showSection('bible')">Bible</button>
<button onclick="showSection('journal')">Prayer Journal</button>
<button onclick="showSection('music')">Worship Music</button>
<button onclick="showSection('discussion')">Discussion</button>
</nav>

<section id="bible" class="section">

<h2>Bible</h2>

<input type="text" id="search" placeholder="Search verses..." onkeyup="searchVerse()">

<div id="verseBox">
<p id="verseText">John 3:16 – For God so loved the world that He gave His one and only Son...</p>
</div>

<button onclick="highlightVerse()">Highlight Verse</button>
<button onclick="favoriteVerse()">⭐ Favorite</button>

</section>


<section id="journal" class="section hidden">

<h2>Prayer Journal</h2>

<textarea id="journalEntry" placeholder="Write your prayer here..."></textarea>

<button onclick="saveJournal()">Save Prayer</button>

<div id="savedPrayers"></div>

</section>


<section id="music" class="section hidden">

<h2>Worship Music</h2>

<iframe width="300" height="170"
src="https://www.youtube.com/embed/3pC9U0z3d4A"
title="Worship Music"
frameborder="0"
allowfullscreen>
</iframe>

</section>


<section id="discussion" class="section hidden">

<h2>Discussion</h2>

<textarea id="discussionInput" placeholder="Share something God has been teaching you..."></textarea>

<button onclick="postDiscussion()">Post</button>

<div id="discussionPosts"></div>

</section>


<script src="script.js"></script>

</body>
</html>
