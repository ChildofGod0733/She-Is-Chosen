```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Faith Bible Study</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Faith Bible Study</h1>
<p class="verse">"A friend loves at all times." – Proverbs 17:17</p>
</header>

<div id="loginBox">
<h3>Optional Login</h3>
<input id="firstName" placeholder="First Name">
<input id="username" placeholder="Username">
<input id="password" placeholder="Password (name + 3 numbers)">
<button onclick="login()">Login</button>
<p id="loginStatus"></p>
</div>

<div class="tabs">
<button onclick="openTab('bible')">Bible</button>
<button onclick="openTab('search')">Search</button>
<button onclick="openTab('notes')">Notes</button>
<button onclick="openTab('highlights')">Highlights</button>
<button onclick="openTab('bookmarks')">Bookmarks</button>
</div>

<div id="bible" class="tab">
<h2>Bible Reader</h2>
<div class="highlightTools">
<button onclick="setColor('yellow')">Yellow</button>
<button onclick="setColor('pink')">Pink</button>
<button onclick="setColor('purple')">Purple</button>
<button onclick="bookmarkVerse()">Bookmark</button>
</div>
<div id="bibleText"></div>
</div>

<div id="search" class="tab">
<h2>Search Bible</h2>
<input id="searchBox" placeholder="Search words...">
<button onclick="searchBible()">Search</button>
<div id="searchResults"></div>
</div>

<div id="notes" class="tab">
<h2>Notes</h2>
<textarea id="noteText" placeholder="Write notes..."></textarea>
<br>
<button onclick="saveNote()">Save Note</button>
<div id="savedNotes"></div>
</div>

<div id="highlights" class="tab">
<h2>Saved Highlights</h2>
<div id="savedHighlights"></div>
</div>

<div id="bookmarks" class="tab">
<h2>Bookmarked Verses</h2>
<div id="savedBookmarks"></div>
</div>

<footer>
<p id="dailyVerse"></p>
</footer>

<script src="script.js"></script>
</body>
</html>
```
