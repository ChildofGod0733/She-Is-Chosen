<!DOCTYPE html>
<html>

<head>

<title>She is Chosen</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

</head>

<body>

<header>

<h1>She is Chosen</h1>

<p class="verse">“She is clothed with strength and dignity.” – Proverbs 31:25</p>

</header>

<nav>

<button onclick="showSection('bible')">Bible</button>

<button onclick="showSection('journal')">Prayer</button>

<button onclick="showSection('music')">Worship</button>

<button onclick="showSection('discussion')">Discussion</button>

</nav>

<!-- LOGIN -->

<div id="loginScreen">

<h2>Welcome</h2>

<p>Login is only required if you would like to save notes and highlights.</p>

<input id="firstName" placeholder="First Name">

<input id="username" placeholder="Username">

<input id="password" placeholder="Password (First name + 3 numbers)">

<button onclick="login()">Enter</button>

</div>

<!-- BIBLE -->

<section id="bible" class="section">

<h2>Bible</h2>

<div id="bookList"></div>

<div id="chapterList"></div>

<div id="verseList"></div>

</section>

<!-- JOURNAL -->

<section id="journal" class="section">

<h2>Prayer Journal</h2>

<textarea id="journalText" placeholder="Write your prayer..."></textarea>

<button onclick="saveJournal()">Save</button>

<div id="journalEntries"></div>

</section>

<!-- MUSIC -->

<section id="music" class="section">

<h2>Worship Music</h2>

<input id="musicLink" placeholder="Paste Spotify or YouTube link">

<button onclick="addMusic()">Add</button>

<div id="musicList"></div>

</section>

<!-- DISCUSSION -->

<section id="discussion" class="section">

<h2>Discussion</h2>

<input id="discussionInput" placeholder="Share encouragement">

<button onclick="postDiscussion()">Post</button>

<div id="discussionPosts"></div>

</section>

<script src="script.js"></script>

</body>

</html>
