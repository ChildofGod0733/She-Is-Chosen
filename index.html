<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>She Is Chosen</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🦋 She Is Chosen</h1>
<p>Proverbs 31:25 — She is clothed in strength and dignity</p>

</header>

<nav>

<button onclick="showTab('home')">Home</button> <button onclick="showTab('bible')">Bible</button> <button onclick="showTab('saved')">Saved</button> <button onclick="showTab('notes')">Notes</button> <button onclick="showTab('devotionals')">Devotionals</button> <button onclick="showTab('discussion')">Discussion</button> <button onclick="showTab('music')">Music</button> <button onclick="showTab('tips')">Tips</button> <button onclick="showTab('prayer')">Prayer</button>

</nav>

<section id="home" class="tab active">

<div class="card">

<h2>Login (Optional)</h2>

<p>You only need to log in if you want to save notes.</p>

<input id="firstName" placeholder="First Name">

<input id="username" placeholder="Username">

<input id="password" placeholder="Password (name + 3 numbers)">

<button onclick="login()">Login</button>

<p id="loginMsg"></p>

</div>

</section>

<section id="bible" class="tab">

<div class="card">

<h2>Bible Reader</h2>

<select id="book">

<option>Genesis</option>
<option>Exodus</option>
<option>Psalms</option>
<option>Matthew</option>
<option>John</option>
<option>Romans</option>

</select>

<input id="chapter" placeholder="Chapter Number">

<button onclick="loadChapter()">Load Chapter</button>

<div id="bibleText"></div>

</div>

</section>

<section id="saved" class="tab">

<div class="card">

<h2>Saved Verses</h2>

<div id="savedVerses"></div>

</div>

</section>

<section id="notes" class="tab">

<div class="card">

<h2>Study Notes</h2>

<textarea id="notes"></textarea>

<button onclick="saveNotes()">Save Notes</button>

</div>

</section>

<section id="devotionals" class="tab">

<div class="card">

<h2>Devotionals</h2>

<textarea id="devText"></textarea>

<button onclick="postDev()">Post</button>

<div id="devList"></div>

</div>

</section>

<section id="discussion" class="tab">

<div class="card">

<h2>Discussion Thread</h2>

<textarea id="discText"></textarea>

<button onclick="postDiscussion()">Post</button>

<div id="discList"></div>

</div>

</section>

<section id="music" class="tab">

<div class="card">

<h2>Worship Music</h2>

<input id="songLink" placeholder="Paste YouTube link">

<button onclick="addSong()">Add Song</button>

<div id="musicList"></div>

</div>

</section>

<section id="tips" class="tab">

<div class="card">

<h2>Bible Study Tips</h2>

<textarea id="tipText"></textarea>

<button onclick="postTip()">Share Tip</button>

<div id="tipList"></div>

</div>

</section>

<section id="prayer" class="tab">

<div class="card">

<h2>Prayer Requests</h2>

<textarea id="prayText"></textarea>

<button onclick="postPrayer()">Share</button>

<div id="prayList"></div>

</div>

</section>

<script src="app.js"></script>

</body>

</html>
