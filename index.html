<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>She Is Chosen</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Quicksand',sans-serif;
  background:linear-gradient(to bottom,#fff0f6,#ffffff);
  color:#5e4b56;
}

header {
  text-align:center;
  padding:40px 20px 10px;
}

h1 {
  font-family:'Playfair Display',serif;
  color:#d88fb3;
  font-size:2rem;
}

.subtitle {
  font-style:italic;
  font-size:0.9rem;
}

nav {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:10px;
}

nav button {
  background:#ffd6e8;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  font-size:0.8rem;
  cursor:pointer;
}

section { display:none; padding:20px; max-width:700px; margin:auto; }
section.active { display:block; }

.card {
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(255,182,210,0.2);
  margin-bottom:20px;
}

textarea,input,select {
  width:100%;
  padding:8px;
  border-radius:12px;
  border:1px solid #ffd6e8;
  margin-top:8px;
}

button.primary {
  background:#ffb3d9;
  border:none;
  padding:8px 14px;
  border-radius:15px;
  margin-top:8px;
  cursor:pointer;
}

.butterflies span {
  position:fixed;
  font-size:20px;
  animation:floatButterfly 18s linear infinite;
  opacity:0.5;
}

.butterflies span:nth-child(1){left:15%;animation-delay:0s;}
.butterflies span:nth-child(2){left:50%;animation-delay:6s;}
.butterflies span:nth-child(3){left:80%;animation-delay:12s;}

@keyframes floatButterfly {
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div class="butterflies">
  <span>🦋</span>
  <span>🦋</span>
  <span>🦋</span>
</div>

<header>
  <h1>She Is Chosen</h1>
  <div class="subtitle">Proverbs 31:25 — She is clothed in strength and dignity.</div>
</header>

<nav>
  <button onclick="showSection('home')">Home</button>
  <button onclick="showSection('bible')">Bible</button>
  <button onclick="showSection('notes')">Notes</button>
  <button onclick="showSection('prayer')">Prayer</button>
</nav>

<section id="home" class="active">
  <div class="card">
    <h3>Verse of the Day</h3>
    <p id="dailyVerse"></p>
  </div>

  <div class="card">
    <h3>Your Profile</h3>
    <input type="text" id="username" placeholder="Enter username">
    <button class="primary" onclick="saveUsername()">Save</button>
    <p id="welcome"></p>
  </div>
</section>

<section id="bible">
  <div class="card">
    <h3>Search Bible</h3>
    <input id="reference" placeholder="John 3:16">
    <button class="primary" onclick="getVerse()">Search</button>
    <p id="verseResult"></p>
    <button class="primary" onclick="saveVerse()">Save Verse</button>
  </div>
</section>

<section id="notes">
  <div class="card">
    <h3>Study Notes</h3>
    <textarea id="notesText"></textarea>
    <button class="primary" onclick="saveNotes()">Save to Cloud</button>
  </div>
</section>

<section id="prayer">
  <div class="card">
    <h3>Prayer Requests</h3>
    <textarea id="prayerText"></textarea>
    <button class="primary" onclick="savePrayer()">Save to Cloud</button>
  </div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDKF0gf1cR1C4qto9iNnoKRKE7T4WO-KhI",
  authDomain: "she-is-chosen.firebaseapp.com",
  projectId: "she-is-chosen",
  storageBucket: "she-is-chosen.firebasestorage.app",
  messagingSenderId: "836410295991",
  appId: "1:836410295991:web:d7831a2187d1e9b5602f32"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.showSection = function(id){
  document.querySelectorAll("section").forEach(sec=>sec.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

window.getVerse = async function(){
  let ref=document.getElementById("reference").value;
  let res=await fetch(`https://bible-api.com/${ref}`);
  let data=await res.json();
  document.getElementById("verseResult").innerText=data.text;
}

window.saveUsername = async function(){
  let user=document.getElementById("username").value;
  await setDoc(doc(db,"users",user),{username:user});
  document.getElementById("welcome").innerText="Welcome, "+user+" 💕";
}

window.saveNotes = async function(){
  let user=document.getElementById("username").value;
  let text=document.getElementById("notesText").value;
  await setDoc(doc(db,"notes",user),{content:text});
  alert("Saved to cloud ☁️");
}

window.savePrayer = async function(){
  let user=document.getElementById("username").value;
  let text=document.getElementById("prayerText").value;
  await setDoc(doc(db,"prayers",user),{content:text});
  alert("Saved to cloud ☁️");
}

window.saveVerse = async function(){
  let user=document.getElementById("username").value;
  let verse=document.getElementById("verseResult").innerText;
  await setDoc(doc(db,"savedVerses",user),{verse:verse});
  alert("Verse saved ☁️");
}

async function getDailyVerse(){
  let verses=["Jeremiah 29:11","Psalm 46:5","Isaiah 41:10","Romans 8:28"];
  let random=verses[Math.floor(Math.random()*verses.length)];
  let res=await fetch(`https://bible-api.com/${random}`);
  let data=await res.json();
  document.getElementById("dailyVerse").innerText=data.text;
}

getDailyVerse();

</script>

</body>
</html>
