<!DOCTYPE html>
<html>

<head>

<title>She is Chosen</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

</head>

<body>

<header>

<h1>She is Chosen</h1>

<p class="verse">“She is clothed with strength and dignity.” — Proverbs 31:25</p>

</header>

<nav>

<button onclick="showSection('bible')">Bible</button>
<button onclick="showSection('journal')">Prayer</button>
<button onclick="showSection('music')">Worship</button>
<button onclick="showSection('discussion')">Discussion</button>
<button onclick="showSection('favorites')">Favorites</button>

</nav>

<!-- Login -->

<div id="loginScreen">

<h2>Welcome</h2>

<p>Login only if you want to save notes.</p>

<input id="firstName" placeholder="First Name">
<input id="username" placeholder="Username">
<input id="password" placeholder="Password (First name + 3 numbers)">

<button onclick="login()">Enter</button>

</div>

<!-- BIBLE -->

<section id="bible" class="section">

<h2>Bible</h2>

<input id="searchInput" placeholder="Search Bible">

<button onclick="searchBible()">Search</button>

<div id="bookList"></div>
<div id="chapterList"></div>
<div id="verseList"></div>

</section>

<!-- FAVORITES -->

<section id="favorites" class="section">

<h2>Favorite Verses</h2>

<div id="favoriteList"></div>

</section>

<!-- JOURNAL -->

<section id="journal" class="section">

<h2>Prayer Journal</h2>

<textarea id="journalText"></textarea>

<button onclick="saveJournal()">Save</button>

<div id="journalEntries"></div>

</section>

<!-- WORSHIP -->

<section id="music" class="section">

<h2>Worship Music</h2>

<input id="musicLink" placeholder="Paste Spotify or YouTube link">

<button onclick="addMusic()">Add</button>

<div id="musicList"></div>

</section>

<!-- DISCUSSION -->

<section id="discussion" class="section">

<h2>Discussion</h2>

<input id="discussionInput" placeholder="Share encouragement">

<button onclick="postDiscussion()">Post</button>

<div id="discussionPosts"></div>

</section>

<div class="butterfly">🦋</div>
<div class="butterfly2">🦋</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script src="script.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
</body>
</html>
