<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bible Study</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Bible Study</h1>
</header>

<!-- LOGIN -->
<div id="loginBox">
<h3>Login (Optional)</h3>
<input id="firstName" placeholder="First Name">
<input id="username" placeholder="Username">
<input id="password" placeholder="Password (name + 3 numbers)">
<button onclick="login()">Login</button>
<p id="loginStatus"></p>
</div>

<!-- TABS -->
<div class="tabs">
<button onclick="openTab('bible')">Bible</button>
<button onclick="openTab('notes')">Notes</button>
<button onclick="openTab('highlighted')">Highlights</button>
</div>

<!-- BIBLE TAB -->
<div id="bible" class="tab">

<h2>Bible Reader</h2>

<div id="bibleText"></div>

<button onclick="saveHighlight()">Save Highlight</button>

</div>

<!-- NOTES TAB -->
<div id="notes" class="tab">

<h2>Notes</h2>

<textarea id="noteText" placeholder="Write notes here..."></textarea>
<br>
<button onclick="saveNote()">Save Note</button>

<div id="savedNotes"></div>

</div>

<!-- HIGHLIGHT TAB -->
<div id="highlighted" class="tab">

<h2>Saved Highlights</h2>

<div id="savedHighlights"></div>

</div>

<script src="script.js"></script>

</body>
</html>
